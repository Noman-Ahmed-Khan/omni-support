        mimeType:
          type: string
        base64Content:
          type: string
        ticketId:
          type: string
          format: uuid
        commentId:
          type: string
          format: uuid
    AIRequest:
      type: object
      properties:
        content:
          type: string
    AIResultsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
