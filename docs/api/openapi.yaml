        phone:
          type: string
        company:
          type: string
        notes:
          type: string
        assignedAgentId:
          type: string
          format: uuid
        externalId:
          type: string
    UpdateCustomerRequest:
      type: object
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
        company:
          type: string
        notes:
          type: string
        assignedAgentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
    CustomerBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        assignedAgentId:
          type: string
          format: uuid
          nullable: true
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        riskScore:
