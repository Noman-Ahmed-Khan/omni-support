            $ref: '#/components/schemas/ActivityLogBase'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
        timestamp:
          type: string
          format: date-time
    PaginatedTicketResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponseTicket'
    PaginatedResponseTicket:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/TicketBase'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
        timestamp:
          type: string
          format: date-time
    PaginatedUserResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponseUser'
    PaginatedResponseUser:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserBase'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
